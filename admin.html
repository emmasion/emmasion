<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Emma Commission</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle, #fbcfe8 1.5px, transparent 1.5px), linear-gradient(135deg, #fff0f4 0%, #fef8f9 50%, #ffe4ec 100%);
            background-size: 28px 28px, 100% 100%;
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar h1 {
            margin: 0;
            font-size: 1.25rem;
            color: #ec4899;
            font-weight: 800;
        }
        .navbar a {
            color: #ec4899;
            background: #fff0f4;
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .navbar a:hover {
            background: #fce7f3;
            transform: translateY(-2px);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.15);
            border: 2px dashed #fbb7c9;
        }
        .settings-grid {
            display: grid;
            gap: 1.25rem;
        }
        @media(min-width: 768px) {
            .settings-grid { grid-template-columns: 1fr 1fr; }
        }
        .card-header {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #475569;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }
        input.readonly {
            background: #f8fafc;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: #e2e8f0;
        }
        .btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.35rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .btn:hover {
            background: #334155;
        }
        .btn-danger {
            background: #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 0.35rem;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        
        /* Gallery Grid Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .settings-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .sample-item-edit {
            background: white;
            border: 2px solid transparent;
            border-radius: 1.25rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.08);
        }
        .sample-item-edit:hover {
            border-color: #fbb7c9;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(236, 72, 153, 0.15);
        }
        .sample-preview-container {
            position: relative;
            height: 220px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }
        .sample-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.25rem;
        }
        .sample-actions {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.35rem;
        }
        .sample-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .sample-details .form-group { margin-bottom: 0; }
        
        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: translateY(150%);
            transition: transform 0.3s;
        }
        .notification.show {
            transform: translateY(0);
        }


        /* Mobile Responsiveness */
        @media (max-width: 640px) {
            .navbar {
                flex-direction: column;
                gap: 0.75rem;
                padding: 1rem;
                text-align: center;
            }
            .container {
                margin: 1rem auto;
                gap: 1rem;
            }
            .card {
                padding: 1.5rem;
                border-radius: 0.5rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
            gap: 0.75rem;
            }
            .sample-actions {
            top: 0.3rem;
            right: 0.3rem;
            }
            .sample-preview-container {
            height: 65px;
            }
            .sample-details {
            padding: 0.6rem;
            gap: 0.35rem;
            }
            .sample-details label {
            font-size: 0.6rem;
            margin-bottom: 0.1rem;
            }
            .sample-details input {
            padding: 0.35rem 0.5rem;
            font-size: 0.75rem;
            }
            .btn {
                width: 100%;
                text-align: center;
            padding: 0.4rem 0.5rem !important;
            font-size: 0.75rem;
            }
            .sample-actions .btn {
                width: auto;
            padding: 0.25rem 0.4rem !important;
            }
            .upload-action-group {
                flex-direction: row;
                flex-wrap: wrap;
            gap: 0.35rem;
            }
            .upload-action-group .g-image {
                width: 100%;
            }
            .settings-buttons {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>Admin Dashboard</h1>
        <a href="index.html" target="_blank">Lihat Website →</a>
    </nav>

    <div class="container">
        <!-- Pengaturan Umum -->
        <div class="card">
            <div class="card-header">Pengaturan Umum</div>
            <div class="settings-grid">
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="628xxx">
                </div>
                <div class="form-group">
                    <label>Google Drive Link</label>
                    <input type="text" id="drive" placeholder="https://drive.google.com/...">
                </div>
                <div class="form-group">
                    <label>Instagram Link</label>
                    <input type="text" id="instagram" placeholder="https://instagram.com/...">
                </div>
                <div class="form-group">
                    <label>Cloudinary Name</label>
                    <input type="text" id="cloudinary" placeholder="dsnion1vf">
                </div>
                <div class="form-group">
                    <label>Upload Preset <small>(Untuk Upload)</small></label>
                    <input type="text" id="uploadPreset" placeholder="contoh: ml_default">
                </div>
                <div class="form-group">
                    <label>API Key <small>(Wajib Untuk Hapus Gambar)</small></label>
                    <input type="text" id="cloudinaryApiKey" placeholder="Masukkan API Key Anda">
                </div>
                <div class="form-group">
                    <label>API Secret <span style="color: #ef4444;">(Rahasia)</span></label>
                    <input type="password" id="cloudinaryApiSecret" placeholder="Masukkan API Secret">
                    <small style="color: #ef4444; font-size: 0.7rem; font-weight: 600; display: block; margin-top: 0.25rem;">*AWAS: Jangan unggah file admin.html ini ke internet publik!</small>
                </div>
            </div>
            
            <div class="settings-buttons">
                <button class="btn" onclick="saveSettings()">Simpan Pengaturan Utama</button>
                <button class="btn btn-danger" onclick="resetSettings()" style="padding: 0.75rem 1.5rem;">Reset Data</button>
            </div>
        </div>


        <!-- Pengaturan Galeri -->
        <div class="card" style="background: transparent; box-shadow: none; border: none; padding: 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
                <div style="flex: 1; min-width: 250px;">
                    <h2 style="margin: 0; font-size: 1.5rem; color: #1e293b;">Galeri Karya</h2>
                    <p style="color: #64748b; font-size: 0.85rem; margin: 0.25rem 0 0;">Kelola gambar dan edit tag/judulnya di sini.</p>
                </div>
                <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
                    <input type="text" id="searchInput" placeholder="Cari judul gambar..." onkeyup="filterGallery()" style="padding: 0.6rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; flex: 1; min-width: 200px;">
                    <input type="file" id="newImageUpload" accept="image/*" style="display: none;" onchange="uploadNewImage(this)">
                    <button class="btn" style="width: auto; padding: 0.6rem 1.25rem; font-size: 0.85rem; background: #ec4899; color: white;" onclick="document.getElementById('newImageUpload').click()">+ Upload Gambar Baru</button>
                    <span id="mainUploadStatus" style="font-size: 0.8rem; font-weight: 600;"></span>
                </div>
            </div>
            <div id="galleryContainer" class="gallery-grid"></div>
        </div>
    </div>

    <div class="notification" id="notif">Perubahan berhasil disimpan!</div>

    <script>
        // Default Config jika kosong
        const DEFAULT_CONFIG = {
            whatsappNumber: '6281235071498',
            googleDriveLink: 'https://drive.google.com/drive/folders/1-pWRSeZDWc7e5uor36SMi8WjWYJb4yjm',
            instagramLink: 'https://www.instagram.com/wuupii.ayy',
            cloudinaryName: 'dsnion1vf',
            uploadPreset: 'dtlq8dnh',
            cloudinaryApiKey: '',
            cloudinaryApiSecret: '',
            sampleTitles: {},
            sampleCategories: {}
        };

        let currentConfig = {};

        // Load Data dari LocalStorage
        function loadData() {
            const saved = localStorage.getItem('emmaConfig');
            const parsedConfig = saved ? JSON.parse(saved) : {};
            currentConfig = { ...DEFAULT_CONFIG, ...parsedConfig };

            // Isi form general
            document.getElementById('whatsapp').value = currentConfig.whatsappNumber || '';
            document.getElementById('drive').value = currentConfig.googleDriveLink || '';
            document.getElementById('instagram').value = currentConfig.instagramLink || '';
            document.getElementById('cloudinary').value = currentConfig.cloudinaryName || '';
            document.getElementById('uploadPreset').value = currentConfig.uploadPreset || '';
            document.getElementById('cloudinaryApiKey').value = currentConfig.cloudinaryApiKey || '';
            document.getElementById('cloudinaryApiSecret').value = currentConfig.cloudinaryApiSecret || '';
            
            renderGallery();
        }

        // Render Gallery Dinamis dari Cloudinary List
        async function renderGallery() {
            const container = document.getElementById('galleryContainer');
            const cloudName = document.getElementById('cloudinary').value || currentConfig.cloudinaryName;
            
            if (!cloudName) return;
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #94a3b8;">Loading galeri...</div>';

            try {
                const response = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/v${Date.now()}/emmasion_gallery.json`);
                if (!response.ok) throw new Error('List tidak ditemukan');
                const data = await response.json();
                
                container.innerHTML = data.resources.map(res => {
                    const imgSrc = `https://res.cloudinary.com/${cloudName}/image/upload/w_400,h_300,c_fill,f_auto/${res.public_id}.${res.format}`;
                    
                    const defaultTitle = res.public_id.split('/').pop().replace(/[_-]/g, ' ').replace(/\b\w/g, char => char.toUpperCase());
                    const currentTitle = (currentConfig.sampleTitles && currentConfig.sampleTitles[res.public_id]) ? currentConfig.sampleTitles[res.public_id] : defaultTitle;
                    const currentCategory = (currentConfig.sampleCategories && currentConfig.sampleCategories[res.public_id]) ? currentConfig.sampleCategories[res.public_id] : 'Digital Art';
                    
                    return `
                        <div class="sample-item-edit">
                            <div class="sample-preview-container">
                                <img src="${imgSrc}" style="display: block" class="preview-img">
                                <div class="sample-actions">
                                    <button class="btn" style="background: #eab308; padding: 0.4rem 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);" onclick="renameImageInCloudinary('${res.public_id}', this)" title="Ganti Nama File Asli">Rename</button>
                                    <button class="btn btn-danger" style="padding: 0.4rem 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);" onclick="removeImage('${res.public_id}', this)" title="Hapus Gambar">Hapus</button>
                                </div>
                            </div>
                            <div style="padding: 0.75rem; border-top: 1px solid #e2e8f0; background: #fafafa;">
                                <label style="font-size: 0.65rem; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; display: block;">Judul Gambar</label>
                                <input type="text" class="title-input" data-id="${res.public_id}" value="${currentTitle}" onchange="updateImageTitle('${res.public_id}', this.value)" style="width: 100%; padding: 0.5rem; font-size: 0.8rem; border-radius: 0.35rem; border: 1px solid #cbd5e1; background: white; margin-bottom: 0.5rem;" placeholder="Ketik judul gambar...">
                                
                                <label style="font-size: 0.65rem; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; display: block;">Kategori / Tag</label>
                                <input type="text" class="category-input" data-id="${res.public_id}" value="${currentCategory}" onchange="updateImageCategory('${res.public_id}', this.value)" style="width: 100%; padding: 0.5rem; font-size: 0.8rem; border-radius: 0.35rem; border: 1px solid #cbd5e1; background: white;" placeholder="Misal: Digital Art">
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ef4444;">Belum ada gambar, atau Anda belum mematikan centang "Resource list" di pengaturan Security Cloudinary.</div>';
            }
        }

        // Update Judul Gambar (Live Preview)
        function updateImageTitle(publicId, newTitle) {
            if (!currentConfig.sampleTitles) currentConfig.sampleTitles = {};
            currentConfig.sampleTitles[publicId] = newTitle;
            localStorage.setItem('emmaConfig', JSON.stringify(currentConfig)); // Sinkron ke tab sebelah
        }
        
        // Update Kategori Gambar (Live Preview)
        function updateImageCategory(publicId, newCategory) {
            if (!currentConfig.sampleCategories) currentConfig.sampleCategories = {};
            currentConfig.sampleCategories[publicId] = newCategory;
            localStorage.setItem('emmaConfig', JSON.stringify(currentConfig)); // Sinkron ke tab sebelah
        }

        // Filter Galeri berdasarkan Judul
        function filterGallery() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const items = document.querySelectorAll('.sample-item-edit');

            items.forEach(item => {
                const titleInput = item.querySelector('.title-input');
                const categoryInput = item.querySelector('.category-input');
                const title = titleInput ? titleInput.value.toLowerCase() : '';
                const category = categoryInput ? categoryInput.value.toLowerCase() : '';
                
                if (title.includes(filter) || category.includes(filter)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Fitur Rename File Langsung di Cloudinary
        async function renameImageInCloudinary(publicId, btnNode) {
            const cloudName = document.getElementById('cloudinary').value;
            const apiKey = document.getElementById('cloudinaryApiKey').value;
            const apiSecret = document.getElementById('cloudinaryApiSecret').value;

            if (!apiKey || !apiSecret) {
                alert("API Key & Secret kosong! Dibutuhkan untuk merename file di Cloudinary.");
                return;
            }

            const oldNameOnly = publicId.split('/').pop();
            const rawNewName = prompt("Masukkan nama file baru untuk Cloudinary (tanpa spasi/simbol):", oldNameOnly);
            
            if (!rawNewName || rawNewName === oldNameOnly) return;
            
            // Format nama agar aman untuk URL/Sistem (huruf kecil & ganti spasi jadi underscore)
            const formattedName = rawNewName.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
            const folder = publicId.substring(0, publicId.lastIndexOf('/') + 1);
            const newPublicId = folder + formattedName;

            if (!confirm(`Yakin ingin merename file dari "${oldNameOnly}" menjadi "${formattedName}" di Cloudinary?`)) return;

            btnNode.textContent = 'Proses...';
            btnNode.disabled = true;

            const timestamp = Math.floor(Date.now() / 1000);
            
            // Rumus Signature Cloudinary Rename (Parameter diurutkan Abjad: from, time, to)
            const stringToSign = `from_public_id=${publicId}&timestamp=${timestamp}&to_public_id=${newPublicId}${apiSecret}`;
            const signature = await sha1(stringToSign);

            const formData = new FormData();
            formData.append('from_public_id', publicId);
            formData.append('to_public_id', newPublicId);
            formData.append('api_key', apiKey);
            formData.append('timestamp', timestamp);
            formData.append('signature', signature);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/rename`, { method: 'POST', body: formData });
                if (response.ok) {
                    // Pindahkan data judul dan kategori lama ke nama file yang baru agar tidak hilang
                    if (currentConfig.sampleTitles && currentConfig.sampleTitles[publicId]) {
                        currentConfig.sampleTitles[newPublicId] = currentConfig.sampleTitles[publicId];
                        delete currentConfig.sampleTitles[publicId];
                    }
                    if (currentConfig.sampleCategories && currentConfig.sampleCategories[publicId]) {
                        currentConfig.sampleCategories[newPublicId] = currentConfig.sampleCategories[publicId];
                        delete currentConfig.sampleCategories[publicId];
                    }

                    // Simpan ulang semua konfigurasi dan muat ulang halaman
                    saveSettings();
                    setTimeout(() => renderGallery(), 1000);
                    alert("Berhasil merename file di Cloudinary!");
                } else throw new Error((await response.json()).error?.message || "Gagal merename");
            } catch (error) {
                alert("Error: " + error.message);
                btnNode.textContent = 'Rename';
                btnNode.disabled = false;
            }
        }

        // Utility: SHA-1 Hash untuk Signature Cloudinary
        async function sha1(string) {
            const buffer = new TextEncoder().encode(string);
            const hash = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Utility: API Request ke Cloudinary Destroy
        async function deleteFromCloudinary(publicId) {
            const cloudName = document.getElementById('cloudinary').value;
            const apiKey = document.getElementById('cloudinaryApiKey').value;
            const apiSecret = document.getElementById('cloudinaryApiSecret').value;

            if (!apiKey || !apiSecret) {
                alert("API Key & Secret kosong! File hanya terhapus dari web, TAPI TIDAK terhapus dari server Cloudinary.");
                return;
            }

            // Buang ekstensi (.jpg/.png) karena Cloudinary destroy menggunakan public_id tanpa format
            const lastDot = publicId.lastIndexOf('.');
            const publicIdWithoutExt = lastDot !== -1 ? publicId.substring(0, lastDot) : publicId;
            const timestamp = Math.floor(Date.now() / 1000);
            
            // Rumus Signature Cloudinary
            const stringToSign = `public_id=${publicIdWithoutExt}&timestamp=${timestamp}${apiSecret}`;
            const signature = await sha1(stringToSign);

            const formData = new FormData();
            formData.append('public_id', publicIdWithoutExt);
            formData.append('api_key', apiKey);
            formData.append('timestamp', timestamp);
            formData.append('signature', signature);

            try {
                await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/destroy`, { method: 'POST', body: formData });
            } catch (error) { console.error('Delete error:', error); }
        }

        // Hapus File Gambar Saja
        async function removeImage(publicId, btnNode) {
            if(!confirm('Hapus file gambar ini permanen dari Cloudinary?')) return;
            btnNode.textContent = 'Menghapus...';
            btnNode.disabled = true;
            await deleteFromCloudinary(publicId);
            setTimeout(() => renderGallery(), 1000); // Render ulang galeri setelah dihapus
        }
        
        function resetSettings() {
            if(confirm('Yakin reset semua ke awal?')) { localStorage.removeItem('emmaConfig'); location.reload(); }
        }

        // Fungsi Upload Baru langsung ke Cloudinary dengan Tag
        async function uploadNewImage(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;

            const cloudName = document.getElementById('cloudinary').value;
            const uploadPreset = document.getElementById('uploadPreset').value;

            if (!cloudName || !uploadPreset) {
                alert('Cloudinary Name dan Upload Preset harus diisi di Pengaturan Umum terlebih dahulu!');
                fileInput.value = '';
                return;
            }

            const statusSpan = document.getElementById('mainUploadStatus');
            
            statusSpan.style.display = 'block';
            statusSpan.style.color = '#64748b';
            statusSpan.textContent = 'Sedang mengupload ke Cloudinary...';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);
            formData.append('tags', 'emmasion_gallery'); // WAJIB: Tambahkan tag agar terbaca oleh web

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok && data.secure_url) {
                    statusSpan.textContent = 'Upload berhasil!';
                    statusSpan.style.color = '#10b981';
                    
                    // Cek apakah Cloudinary memblokir pemberian tag
                    if (!data.tags || !data.tags.includes('emmasion_gallery')) {
                        alert("PERINGATAN CLOUDINARY:\nGambar berhasil masuk ke Cloudinary, TAPI ditolak masuk ke web karena Upload Preset Anda belum diatur untuk menerima Tag.\n\nBuka Setingan Upload Preset di Cloudinary, cari kolom 'Tags', lalu isi dengan: emmasion_gallery");
                    }

                    renderGallery(); // Render ulang galeri agar gambar baru muncul

                    setTimeout(() => statusSpan.style.display = 'none', 3000);
                } else throw new Error(data.error?.message || 'Upload gagal');
            } catch (error) {
                statusSpan.textContent = 'Error: ' + error.message;
                statusSpan.style.color = '#ef4444';
            }
            fileInput.value = ''; // Reset input agar bisa upload file yang sama lagi jika perlu
        }

        // Simpan Semua Perubahan
        function saveSettings() {
            currentConfig.whatsappNumber = document.getElementById('whatsapp').value;
            currentConfig.googleDriveLink = document.getElementById('drive').value;
            currentConfig.instagramLink = document.getElementById('instagram').value;
            currentConfig.cloudinaryName = document.getElementById('cloudinary').value;
            currentConfig.uploadPreset = document.getElementById('uploadPreset').value;
            currentConfig.cloudinaryApiKey = document.getElementById('cloudinaryApiKey').value;
            currentConfig.cloudinaryApiSecret = document.getElementById('cloudinaryApiSecret').value;

            // Pastikan semua ketikan judul gambar tertangkap dan tersimpan
            if (!currentConfig.sampleTitles) currentConfig.sampleTitles = {};
            if (!currentConfig.sampleCategories) currentConfig.sampleCategories = {};
            
            document.querySelectorAll('.title-input').forEach(input => {
                currentConfig.sampleTitles[input.getAttribute('data-id')] = input.value;
            });
            document.querySelectorAll('.category-input').forEach(input => {
                currentConfig.sampleCategories[input.getAttribute('data-id')] = input.value;
            });

            // Simpan ke Local Storage
            localStorage.setItem('emmaConfig', JSON.stringify(currentConfig));
            
            // Tampilkan Notifikasi
            const notif = document.getElementById('notif');
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Inisialisasi awal
        loadData();
    </script>
</body>
</html>
